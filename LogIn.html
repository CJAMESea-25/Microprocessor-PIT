<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="logo"> 
      <img src="images/BayadBoardLogo.png" alt="BayanBoard Logo">
      <span>BayanBoard</span>
    </div>
  </header>

  <main class="login-page">
    <section class="login-form">
      <h1>ADMIN LOGIN</h1>
      <p>For security and accuracy, only authorized administrators are allowed to post on the Community Digital Bulletin Board. Please log in to manage and publish official announcements.</p>
      
      <form>
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <div class="buttons">
            <a href="LandingPage.html" class="btn dark">GO BACK</a>
            <a href="#" class="btn blue">LOG IN</a>
          </div>
      </form>
    </section>

    <section class="admin-illustration">
      <img src="images/AdminLogIn.png" alt="Admin Login Illustration">
      <a href="https://storyset.com/online">Online Illustrations by Storyset</a>
    </section>
  </main>
</body>
</html>
